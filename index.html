<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<title>颜的网站</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
  }

  body {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: white;
    width: 380px;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
  }

  .avatar {
    width: 100px;
    height: 100px;
    background-image: url("https://q1.qlogo.cn/qhis/jRoggJ2RF3BSYIxzuMs468LhIVwUVicmmO3U1lyag2t3tfYNhGFdDXGicicDWShGTnqhZS1U7RwvNgS0D4oY2eAmA/640");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    margin: 0 auto 20px;
  }

  h1 {
    font-size: 24px;
    color: #333;
    margin-bottom: 10px;
  }

  p {
    color: #666;
    margin-bottom: 30px;
  }
</style>
</head>

<body>
  <div class="card">
    <div class="avatar"></div>
    <h1>颜的网站</h1>
    <p>不是91暗网</p>
  </div>
</body>
</html>
